{% include base_path %}

<!-- start custom head snippets -->

<!-- Favicon: SVG monogram in the plum accent — works in all current browsers.
     The original AcademicPages template linked a full PNG/ICO set (apple-touch-icon-*,
     favicon-16/32/96.png, android-chrome, favicon.ico) but those files were never in
     /images/, so they 404'd. If you want legacy/iOS coverage, run images/favicon.svg
     (or your photo) through https://realfavicongenerator.net and restore the full set. -->
<link rel="icon" type="image/svg+xml" href="{{ base_path }}/images/favicon.svg">
<link rel="mask-icon" href="{{ base_path }}/images/safari-pinned-tab.svg?v=M44lzPylqQ" color="#6b4e71">
<link rel="manifest" href="{{ base_path }}/images/manifest.json?v=M44lzPylqQ">
<meta name="msapplication-TileColor" content="#6b4e71">
<meta name="msapplication-TileImage" content="{{ base_path }}/images/mstile-144x144.png?v=M44lzPylqQ">
<meta name="msapplication-config" content="{{ base_path }}/images/browserconfig.xml?v=M44lzPylqQ">
<meta name="theme-color" content="#faf8f6">
<link rel="stylesheet" href="{{ base_path }}/assets/css/academicons.css"/>

<!-- Redesign webfonts: Source Serif 4 (display/serif), Inter (body/UI), JetBrains Mono (rare) -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=Source+Serif+4:opsz,wght@8..60,400;8..60,500&family=JetBrains+Mono:wght@400&display=swap">

<script type="text/x-mathjax-config"> MathJax.Hub.Config({ TeX: { equationNumbers: { autoNumber: "all" } } }); </script>
<script type="text/x-mathjax-config">
  MathJax.Hub.Config({
    tex2jax: {
      inlineMath: [ ['$','$'], ["\\(","\\)"] ],
      processEscapes: true
    }
  });
</script>
<script src='https://cdnjs.cloudflare.com/ajax/libs/mathjax/2.7.4/latest.js?config=TeX-MML-AM_CHTML' async></script>

<!-- end custom head snippets -->
